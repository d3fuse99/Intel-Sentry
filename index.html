<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEL-SENTRY // OSINT Recon Console</title>
    <style>
        :root {
            --bg-color: #05070a;
            --panel-color: #0b0f17;
            --border-color: #1e293b;
            --text-primary: #f8fafc;
            --text-muted: #64748b;
            --accent-blue: #0ea5e9;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --accent-amber: #f59e0b;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1100px;
        }
        header {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 12px;
            margin-bottom: 25px;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-shadow: 0 0 8px rgba(14, 165, 233, 0.4);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background-color: rgba(14, 165, 233, 0.05);
        }
        .tab-content {
            display: none;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .tab-content.active {
            display: block;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        input, select {
            background-color: #05070a;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            border-radius: 3px;
        }
        input:focus, select:focus {
            border-color: var(--accent-blue);
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-background-clip: text;
            -webkit-text-fill-color: var(--text-primary) !important;
            transition: background-color 5000s ease-in-out 0s;
            box-shadow: inset 0 0 20px 20px #05070a !important;
        }
        button.action-btn {
            background-color: rgba(14, 165, 233, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            margin-top: 15px;
            width: 100%;
        }
        button.action-btn:hover {
            background-color: var(--accent-blue);
            color: #05070a;
            box-shadow: 0 0 8px rgba(14, 165, 233, 0.4);
        }
        .timeline-container {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            min-height: 250px;
            max-height: 450px;
            overflow-y: auto;
        }
        .timeline-event {
            position: relative;
            padding-left: 24px;
            border-left: 2px solid var(--border-color);
            margin-bottom: 18px;
            animation: fadeIn 0.25s ease-in-out;
        }
        .timeline-event::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 5px;
            width: 10px;
            height: 10px;
            background-color: var(--text-muted);
            border-radius: 50%;
        }
        .timeline-event.success::before {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }
        .timeline-event.error::before {
            background-color: var(--accent-red);
            box-shadow: 0 0 8px var(--accent-red);
        }
        .timeline-event.warning::before {
            background-color: var(--accent-amber);
            box-shadow: 0 0 8px var(--accent-amber);
        }
        .timeline-event.info::before {
            background-color: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
        }
        .event-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .event-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin: 4px 0;
        }
        .event-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            background: rgba(5, 7, 10, 0.5);
            padding: 8px;
            border-radius: 3px;
            margin-top: 5px;
            border: 1px solid rgba(30, 41, 59, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>INTEL-SENTRY 🌐</h1>
            <div class="subtitle">Asynchronous Digital Footprint Aggregator & OSINT Reconnaissance Console</div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('personality')">👤 Личность & Документы</button>
            <button class="tab-btn" onclick="switchTab('contacts')">📞 Контакты & Соцсети</button>
            <button class="tab-btn" onclick="switchTab('assets')">🚘 Транспорт & Имущество</button>
            <button class="tab-btn" onclick="switchTab('traces')">🌐 Следы & Поиск Лица</button>
        </div>

        <div id="personality" class="tab-content active">
            <div class="input-grid">
                <div class="form-group">
                    <label>ФИО / Возраст / Дата рождения</label>
                    <input type="text" id="p-fio" placeholder="Навальный Алексей Анатольевич 04.06.1976">
                </div>
                <div class="form-group">
                    <label>Номер паспорта РФ / СНГ</label>
                    <input type="text" id="p-passport" placeholder="Серия Номер (например, 4515 123456)">
                </div>
                <div class="form-group">
                    <label>СНИЛС</label>
                    <input type="text" id="p-snils" placeholder="XXX-XXX-XXX YY">
                </div>
                <div class="form-group">
                    <label>ИНН (Физическое / Юридическое лицо)</label>
                    <input type="text" id="p-inn" placeholder="10 или 12 цифр">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('personality')">ЗАПУСТИТЬ АНАЛИЗ ЛИЧНОСТИ</button>
        </div>

        <div id="contacts" class="tab-content">
            <div class="input-grid">
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="text" id="c-phone" placeholder="79999688666 / +380...">
                </div>
                <div class="form-group">
                    <label>E-mail адрес</label>
                    <input type="text" id="c-email" placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label>Telegram (Логин / ID)</label>
                    <input type="text" id="c-telegram" placeholder="@username или tg123456">
                </div>
                <div class="form-group">
                    <label>Профили (VK / TikTok / Instagram / OK)</label>
                    <input type="text" id="c-social" placeholder="Ссылка или никнейм">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('contacts')">ЗАПУСТИТЬ ПОИСК КОНТАКТОВ</button>
        </div>

        <div id="assets" class="tab-content">
            <div class="input-grid">
                <div class="form-group">
                    <label>Гос. номер автомобиля</label>
                    <input type="text" id="a-plate" placeholder="B3950K199">
                </div>
                <div class="form-group">
                    <label>VIN номер автомобиля</label>
                    <input type="text" id="a-vin" placeholder="17 символов">
                </div>
                <div class="form-group">
                    <label>Адрес недвижимости</label>
                    <input type="text" id="a-address" placeholder="Город, Улица, Дом">
                </div>
                <div class="form-group">
                    <label>Кадастровый номер</label>
                    <input type="text" id="a-cadastral" placeholder="77:01:0004042:6987">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('assets')">ЗАПУСТИТЬ АНАЛИЗ ИМУЩЕСТВА</button>
        </div>

        <div id="traces" class="tab-content">
            <div class="input-grid">
                <div class="form-group">
                    <label>Домен или IP-адрес</label>
                    <input type="text" id="t-domain" placeholder="google.com или 1.1.1.1">
                </div>
                <div class="form-group">
                    <label>Поиск по тегам (телефонные книги)</label>
                    <input type="text" id="t-tags" placeholder="хирург москва">
                </div>
                <div class="form-group">
                    <label>Поиск по лицу (Загрузка фото)</label>
                    <input type="file" id="t-face" accept="image/*">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('traces')">ЗАПУСТИТЬ ПОИСК СЛЕДОВ</button>
        </div>

        <div class="timeline-container" id="timeline">
            <div class="timeline-event info">
                <div class="event-time">SYSTEM CONSOLE READY</div>
                <div class="event-title">Ожидание параметров цели...</div>
                <div class="event-detail">Заполните поля в нужной вкладке и нажмите кнопку запуска сканирования для получения данных.</div>
            </div>
        </div>
    </div>

    <script>
        let currentEventSource = null;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function appendEvent(title, detail, type = 'info') {
            const timeline = document.getElementById('timeline');
            const eventDiv = document.createElement('div');
            eventDiv.className = `timeline-event ${type}`;
            const now = new Date().toISOString().split('T')[1].slice(0, 8);
            eventDiv.innerHTML = `
                <div class="event-time">[${now}]</div>
                <div class="event-title">${title}</div>
                <div class="event-detail">${detail}</div>
            `;
            timeline.appendChild(eventDiv);
            timeline.scrollTop = timeline.scrollHeight;
        }

        async function executeScan(tabId) {
            if (currentEventSource) {
                currentEventSource.close();
            }
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            let payload = {};
            if (tabId === 'personality') {
                payload = {
                    type: 'personality',
                    fio: document.getElementById('p-fio').value.trim(),
                    passport: document.getElementById('p-passport').value.trim(),
                    snils: document.getElementById('p-snils').value.trim(),
                    inn: document.getElementById('p-inn').value.trim()
                };
            } else if (tabId === 'contacts') {
                payload = {
                    type: 'contacts',
                    phone: document.getElementById('c-phone').value.trim(),
                    email: document.getElementById('c-email').value.trim(),
                    telegram: document.getElementById('c-telegram').value.trim(),
                    social: document.getElementById('c-social').value.trim()
                };
            } else if (tabId === 'assets') {
                payload = {
                    type: 'assets',
                    plate: document.getElementById('a-plate').value.trim(),
                    vin: document.getElementById('a-vin').value.trim(),
                    address: document.getElementById('a-address').value.trim(),
                    cadastral: document.getElementById('a-cadastral').value.trim()
                };
            } else if (tabId === 'traces') {
                const faceFile = document.getElementById('t-face').files[0];
                if (faceFile) {
                    appendEvent('ОБРАБОТКА ИЗОБРАЖЕНИЯ', 'Загрузка биометрических данных лица...', 'info');
                    const formData = new FormData();
                    formData.append('face', faceFile);
                    try {
                        const response = await fetch('/face_upload', {
                            method: 'POST',
                            body: formData
                        });
                        const resData = await response.json();
                        appendEvent(resData.title, resData.detail, resData.status);
                    } catch (e) {
                        appendEvent('ОШИБКА ЗАГРУЗКИ', 'Не удалось загрузить файл лица на сервер.', 'error');
                    }
                }
                payload = {
                    type: 'traces',
                    domain: document.getElementById('t-domain').value.trim(),
                    tags: document.getElementById('t-tags').value.trim()
                };
            }

            const activeFields = Object.keys(payload).filter(k => payload[k] && k !== 'type');
            if (activeFields.length === 0 && !document.getElementById('t-face').files[0]) {
                appendEvent('ОШИБКА ИНИЦИАЛИЗАЦИИ', 'Не заполнено ни одно поле для запуска.', 'error');
                return;
            }

            appendEvent('ПОДКЛЮЧЕНИЕ К КАНАЛУ ДАННЫХ', 'Установка SSE соединения...', 'info');
            const queryString = new URLSearchParams(payload).toString();
            currentEventSource = new EventSource(`/scan?${queryString}`);

            currentEventSource.onmessage = function(event) {
                try {
                    const payload = JSON.parse(event.data);
                    appendEvent(payload.title, payload.detail, payload.status);
                } catch (e) {
                    appendEvent('ОШИБКА ДЕКОДИРОВАНИЯ ПОТОКА', 'Поврежденные данные в стриме.', 'error');
                }
            };

            currentEventSource.addEventListener('end', function() {
                appendEvent('СКАНИРОВАНИЕ ЗАВЕРШЕНО', 'Поток данных закрыт.', 'success');
                currentEventSource.close();
                currentEventSource = null;
            });

            currentEventSource.onerror = function() {
                currentEventSource.close();
                currentEventSource = null;
            };
        }
    </script>
</body>
</html>
