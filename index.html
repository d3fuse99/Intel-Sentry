<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEL-SENTRY // OSINT Recon Console</title>
    <style>
        :root {
            --bg-color: #05070a;
            --panel-color: #0b0f17;
            --border-color: #1e293b;
            --text-primary: #f8fafc;
            --text-muted: #64748b;
            --accent-blue: #0ea5e9;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --accent-amber: #f59e0b;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1100px;
        }
        header {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-shadow: 0 0 8px rgba(14, 165, 233, 0.4);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .lang-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-select {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
            padding: 6px 12px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            border-radius: 3px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background-color: rgba(14, 165, 233, 0.05);
        }
        .tab-content {
            display: none;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .tab-content.active {
            display: block;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        input, select {
            background-color: #05070a;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            border-radius: 3px;
        }
        input:focus, select:focus {
            border-color: var(--accent-blue);
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-background-clip: text;
            -webkit-text-fill-color: var(--text-primary) !important;
            transition: background-color 5000s ease-in-out 0s;
            box-shadow: inset 0 0 20px 20px #05070a !important;
        }
        button.action-btn {
            background-color: rgba(14, 165, 233, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            margin-top: 15px;
            width: 100%;
        }
        button.action-btn:hover {
            background-color: var(--accent-blue);
            color: #05070a;
            box-shadow: 0 0 8px rgba(14, 165, 233, 0.4);
        }
        .timeline-container {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            min-height: 250px;
            max-height: 450px;
            overflow-y: auto;
        }
        .timeline-event {
            position: relative;
            padding-left: 24px;
            border-left: 2px solid var(--border-color);
            margin-bottom: 18px;
            animation: fadeIn 0.25s ease-in-out;
        }
        .timeline-event::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 5px;
            width: 10px;
            height: 10px;
            background-color: var(--text-muted);
            border-radius: 50%;
        }
        .timeline-event.success::before {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }
        .timeline-event.error::before {
            background-color: var(--accent-red);
            box-shadow: 0 0 8px var(--accent-red);
        }
        .timeline-event.warning::before {
            background-color: var(--accent-amber);
            box-shadow: 0 0 8px var(--accent-amber);
        }
        .timeline-event.info::before {
            background-color: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
        }
        .event-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .event-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin: 4px 0;
        }
        .event-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            background: rgba(5, 7, 10, 0.5);
            padding: 8px;
            border-radius: 3px;
            margin-top: 5px;
            border: 1px solid rgba(30, 41, 59, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1 data-translate="title">INTEL-SENTRY 🌐</h1>
                <div class="subtitle" data-translate="subtitle">Asynchronous Digital Footprint Aggregator & OSINT Reconnaissance Console</div>
            </div>
            <div class="lang-control">
                <select id="lang-select" class="lang-select" onchange="changeLanguage()">
                    <option value="ru" selected>RU</option>
                    <option value="en">EN</option>
                </select>
            </div>
        </header>

        <div class="tabs">
            <button id="tab-personality-btn" class="tab-btn active" onclick="switchTab('personality')" data-translate="tab_personality">👤 Личность & Документы</button>
            <button id="tab-contacts-btn" class="tab-btn" onclick="switchTab('contacts')" data-translate="tab_contacts">📞 Контакты & Соцсети</button>
            <button id="tab-assets-btn" class="tab-btn" onclick="switchTab('assets')" data-translate="tab_assets">🚘 Транспорт & Имущество</button>
            <button id="tab-traces-btn" class="tab-btn" onclick="switchTab('traces')" data-translate="tab_traces">🌐 Следы & Поиск Лица</button>
        </div>

        <div id="personality" class="tab-content active">
            <div class="input-grid">
                <div class="form-group">
                    <label data-translate="label_fio">ФИО / Возраст / Дата рождения</label>
                    <input type="text" id="p-fio" placeholder="Навальный Алексей Анатольевич 04.06.1976">
                </div>
                <div class="form-group">
                    <label data-translate="label_passport">Номер паспорта РФ / СНГ</label>
                    <input type="text" id="p-passport" placeholder="Серия Номер (например, 4515 123456)">
                </div>
                <div class="form-group">
                    <label data-translate="label_snils">СНИЛС</label>
                    <input type="text" id="p-snils" placeholder="XXX-XXX-XXX YY">
                </div>
                <div class="form-group">
                    <label data-translate="label_inn">ИНН (Физическое / Юридическое лицо)</label>
                    <input type="text" id="p-inn" placeholder="10 или 12 цифр">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('personality')" data-translate="btn_personality">ЗАПУСТИТЬ АНАЛИЗ ЛИЧНОСТИ</button>
        </div>

        <div id="contacts" class="tab-content">
            <div class="input-grid">
                <div class="form-group">
                    <label data-translate="label_phone">Номер телефона</label>
                    <input type="text" id="c-phone" placeholder="79999688666 / +380...">
                </div>
                <div class="form-group">
                    <label data-translate="label_email">E-mail адрес</label>
                    <input type="text" id="c-email" placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label data-translate="label_telegram">Telegram (Логин / ID)</label>
                    <input type="text" id="c-telegram" placeholder="@username или tg123456">
                </div>
                <div class="form-group">
                    <label data-translate="label_social">Профили (VK / TikTok / Instagram / OK)</label>
                    <input type="text" id="c-social" placeholder="Ссылка или никнейм">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('contacts')" data-translate="btn_contacts">ЗАПУСТИТЬ ПОИСК КОНТАКТОВ</button>
        </div>

        <div id="assets" class="tab-content">
            <div class="input-grid">
                <div class="form-group">
                    <label data-translate="label_plate">Гос. номер автомобиля</label>
                    <input type="text" id="a-plate" placeholder="B3950K199">
                </div>
                <div class="form-group">
                    <label data-translate="label_vin">VIN номер автомобиля</label>
                    <input type="text" id="a-vin" placeholder="17 символов">
                </div>
                <div class="form-group">
                    <label data-translate="label_address">Адрес недвижимости</label>
                    <input type="text" id="a-address" placeholder="Город, Улица, Дом">
                </div>
                <div class="form-group">
                    <label data-translate="label_cadastral">Кадастровый номер</label>
                    <input type="text" id="a-cadastral" placeholder="77:01:0004042:6987">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('assets')" data-translate="btn_assets">ЗАПУСТИТЬ АНАЛИЗ ИМУЩЕСТВА</button>
        </div>

        <div id="traces" class="tab-content">
            <div class="input-grid">
                <div class="form-group">
                    <label data-translate="label_domain">Домен или IP-адрес</label>
                    <input type="text" id="t-domain" placeholder="google.com или 1.1.1.1">
                </div>
                <div class="form-group">
                    <label data-translate="label_tags">Поиск по тегам (телефонные книги)</label>
                    <input type="text" id="t-tags" placeholder="хирург москва">
                </div>
                <div class="form-group">
                    <label data-translate="label_face">Поиск по лицу (Загрузка фото)</label>
                    <input type="file" id="t-face" accept="image/*">
                </div>
            </div>
            <button class="action-btn" onclick="executeScan('traces')" data-translate="btn_traces">ЗАПУСТИТЬ ПОИСК СЛЕДОВ</button>
        </div>

        <div class="timeline-container" id="timeline">
            <div id="init-event" class="timeline-event info">
                <div class="event-time">SYSTEM CONSOLE READY</div>
                <div class="event-title" data-translate="ready_title">Ожидание параметров цели...</div>
                <div class="event-detail" data-translate="ready_detail">Заполните поля в нужной вкладке и нажмите кнопку запуска сканирования для получения данных.</div>
            </div>
        </div>
    </div>

    <script>
        let currentEventSource = null;
        let currentLang = 'ru';

        const translations = {
            ru: {
                title: "INTEL-SENTRY 🌐",
                subtitle: "Asynchronous Digital Footprint Aggregator & OSINT Reconnaissance Console",
                tab_personality: "👤 Личность & Документы",
                tab_contacts: "📞 Контакты & Соцсети",
                tab_assets: "🚘 Транспорт & Имущество",
                tab_traces: "🌐 Следы & Поиск Лица",
                label_fio: "ФИО / Возраст / Дата рождения",
                label_passport: "Номер паспорта РФ / СНГ",
                label_snils: "СНИЛС",
                label_inn: "ИНН (Физическое / Юридическое лицо)",
                btn_personality: "ЗАПУСТИТЬ АНАЛИЗ ЛИЧНОСТИ",
                label_phone: "Номер телефона",
                label_email: "E-mail адрес",
                label_telegram: "Telegram (Логин / ID)",
                label_social: "Профили (VK / TikTok / Instagram / OK)",
                btn_contacts: "ЗАПУСТИТЬ ПОИСК КОНТАКТОВ",
                label_plate: "Гос. номер автомобиля",
                label_vin: "VIN номер автомобиля",
                label_address: "Адрес недвижимости",
                label_cadastral: "Кадастровый номер",
                btn_assets: "ЗАПУСТИТЬ АНАЛИЗ ИМУЩЕСТВА",
                label_domain: "Домен или IP-адрес",
                label_tags: "Поиск по тегам (телефонные книги)",
                label_face: "Поиск по лицу (Загрузка фото)",
                btn_traces: "ЗАПУСТИТЬ ПОИСК СЛЕДОВ",
                ready_title: "Ожидание параметров цели...",
                ready_detail: "Заполните поля в нужной вкладке и нажмите кнопку запуска сканирования для получения данных.",
                msg_conn: "ПОДКЛЮЧЕНИЕ К КАНАЛУ ДАННЫХ",
                msg_conn_detail: "Установка SSE соединения...",
                msg_img: "ОБРАБОТКА ИЗОБРАЖЕНИЯ",
                msg_img_detail: "Загрузка биометрических данных лица...",
                msg_upload_err: "ОШИБКА ЗАГРУЗКИ",
                msg_upload_err_detail: "Не удалось загрузить файл лица на сервер.",
                msg_init_err: "ОШИБКА ИНИЦИАЛИЗАЦИИ",
                msg_init_err_detail: "Не заполнено ни одно поле для запуска.",
                msg_scan_end: "СКАНИРОВАНИЕ ЗАВЕРШЕНО",
                msg_scan_end_detail: "Поток данных закрыт."
            },
            en: {
                title: "INTEL-SENTRY 🌐",
                subtitle: "Asynchronous Digital Footprint Aggregator & OSINT Reconnaissance Console",
                tab_personality: "👤 Identity & Documents",
                tab_contacts: "📞 Contacts & Socials",
                tab_assets: "🚘 Transport & Assets",
                tab_traces: "🌐 Traces & Face Search",
                label_fio: "Full Name / Age / Birth Date",
                label_passport: "Passport Number (RF / CIS)",
                label_snils: "SNILS",
                label_inn: "INN (Individual / Legal Entity)",
                btn_personality: "LAUNCH IDENTITY ANALYSIS",
                label_phone: "Phone Number",
                label_email: "E-mail Address",
                label_telegram: "Telegram (Username / ID)",
                label_social: "Profiles (VK / TikTok / Instagram / OK)",
                btn_contacts: "LAUNCH CONTACTS SEARCH",
                label_plate: "License Plate Number",
                label_vin: "VIN Number",
                label_address: "Real Estate Address",
                label_cadastral: "Cadastral Number",
                btn_assets: "LAUNCH ASSETS ANALYSIS",
                label_domain: "Domain or IP Address",
                label_tags: "Tag Search (Phonebooks)",
                label_face: "Face Search (Upload Photo)",
                btn_traces: "LAUNCH TRACES SEARCH",
                ready_title: "Awaiting Target Parameters...",
                ready_detail: "Fill in the fields in the desired tab and press the scan button to retrieve data.",
                msg_conn: "CONNECTING TO DATA CHANNEL",
                msg_conn_detail: "Establishing SSE connection...",
                msg_img: "PROCESSING IMAGE",
                msg_img_detail: "Uploading face biometric data...",
                msg_upload_err: "UPLOAD ERROR",
                msg_upload_err_detail: "Failed to upload face file to the server.",
                msg_init_err: "INITIALIZATION ERROR",
                msg_init_err_detail: "No fields are filled for initialization.",
                msg_scan_end: "SCANNING COMPLETE",
                msg_scan_end_detail: "Data stream closed."
            }
        };

        function changeLanguage() {
            currentLang = document.getElementById('lang-select').value;
            document.querySelectorAll('[data-translate]').forEach(elem => {
                const key = elem.getAttribute('data-translate');
                if (translations[currentLang][key]) {
                    elem.textContent = translations[currentLang][key];
                }
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function appendEvent(title, detail, type = 'info') {
            const timeline = document.getElementById('timeline');
            const eventDiv = document.createElement('div');
            eventDiv.className = `timeline-event ${type}`;
            const now = new Date().toISOString().split('T')[1].slice(0, 8);
            eventDiv.innerHTML = `
                <div class="event-time">[${now}]</div>
                <div class="event-title">${title}</div>
                <div class="event-detail">${detail}</div>
            `;
            timeline.appendChild(eventDiv);
            timeline.scrollTop = timeline.scrollHeight;
        }

        async function executeScan(tabId) {
            if (currentEventSource) {
                currentEventSource.close();
            }
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            let payload = {};
            if (tabId === 'personality') {
                payload = {
                    type: 'personality',
                    fio: document.getElementById('p-fio').value.trim(),
                    passport: document.getElementById('p-passport').value.trim(),
                    snils: document.getElementById('p-snils').value.trim(),
                    inn: document.getElementById('p-inn').value.trim()
                };
            } else if (tabId === 'contacts') {
                payload = {
                    type: 'contacts',
                    phone: document.getElementById('c-phone').value.trim(),
                    email: document.getElementById('c-email').value.trim(),
                    telegram: document.getElementById('c-telegram').value.trim(),
                    social: document.getElementById('c-social').value.trim()
                };
            } else if (tabId === 'assets') {
                payload = {
                    type: 'assets',
                    plate: document.getElementById('a-plate').value.trim(),
                    vin: document.getElementById('a-vin').value.trim(),
                    address: document.getElementById('a-address').value.trim(),
                    cadastral: document.getElementById('a-cadastral').value.trim()
                };
            } else if (tabId === 'traces') {
                const faceFile = document.getElementById('t-face').files[0];
                if (faceFile) {
                    appendEvent(translations[currentLang].msg_img, translations[currentLang].msg_img_detail, 'info');
                    const formData = new FormData();
                    formData.append('face', faceFile);
                    try {
                        const response = await fetch(`/face_upload?lang=${currentLang}`, {
                            method: 'POST',
                            body: formData
                        });
                        const resData = await response.json();
                        appendEvent(resData.title, resData.detail, resData.status);
                    } catch (e) {
                        appendEvent(translations[currentLang].msg_upload_err, translations[currentLang].msg_upload_err_detail, 'error');
                    }
                }
                payload = {
                    type: 'traces',
                    domain: document.getElementById('t-domain').value.trim(),
                    tags: document.getElementById('t-tags').value.trim()
                };
            }

            const activeFields = Object.keys(payload).filter(k => payload[k] && k !== 'type');
            if (activeFields.length === 0 && !document.getElementById('t-face').files[0]) {
                appendEvent(translations[currentLang].msg_init_err, translations[currentLang].msg_init_err_detail, 'error');
                return;
            }

            appendEvent(translations[currentLang].msg_conn, translations[currentLang].msg_conn_detail, 'info');
            const queryString = new URLSearchParams(payload).toString();
            currentEventSource = new EventSource(`/scan?${queryString}&lang=${currentLang}`);

            currentEventSource.onmessage = function(event) {
                try {
                    const payload = JSON.parse(event.data);
                    appendEvent(payload.title, payload.detail, payload.status);
                } catch (e) {
                    appendEvent('DECODING ERROR', 'Corrupted stream chunk.', 'error');
                }
            };

            currentEventSource.addEventListener('end', function() {
                appendEvent(translations[currentLang].msg_scan_end, translations[currentLang].msg_scan_end_detail, 'success');
                currentEventSource.close();
                currentEventSource = null;
            });

            currentEventSource.onerror = function() {
                currentEventSource.close();
                currentEventSource = null;
            };
        }
    </script>
</body>
</html>
